name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create release draft
    runs-on: ubuntu-24.04
    # Keep the workflow default read-only; only release creation/upload jobs need
    # write credentials, and checkout itself runs with persisted credentials off.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate tag version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cargo_version=$(scripts/cargo-version.sh)
          if [ "$TAG" != "v${cargo_version}" ]; then
            echo "release tag ${TAG} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if is_draft=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null); then
            if [ "$is_draft" = "true" ]; then
              echo "release ${TAG} draft already exists; reusing it"
              exit 0
            fi
            echo "release ${TAG} already exists and is published; bump Cargo.toml before releasing" >&2
            exit 1
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft --title "$TAG" --generate-notes

  build:
    name: Build ${{ matrix.asset-platform }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    # Asset upload is the only write operation in this job. Keeping that
    # permission job-scoped avoids granting release credentials to unrelated CI.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-musl
            asset-platform: linux-x86_64-musl
          - os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-musl
            asset-platform: linux-aarch64-musl
          - os: macos-15-intel
            rust-target: x86_64-apple-darwin
            asset-platform: macos-x86_64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            asset-platform: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust-target }}

      # Build native archives on hosted runners for every v1 release target.
      # Keeping packaging in a script makes the release contract locally
      # reproducible and gives dotfiles/shdeps one stable archive shape.
      - name: Package archive
        run: scripts/package-release.sh "${{ matrix.rust-target }}" "${{ matrix.asset-platform }}"

      - name: Smoke install
        env:
          VERSION: ${{ github.ref_name }}
          ASSET_PLATFORM: ${{ matrix.asset-platform }}
        run: |
          archive="dist/hm-${VERSION}-${ASSET_PLATFORM}.tar.gz"
          mkdir -p smoke
          tar -xzf "$archive" -C smoke
          ./smoke/hm --version
          ./smoke/hm stores init personal --root "$PWD/smoke-store"
          cat >smoke-config.toml <<EOF
          default_store = "personal"

          [stores.personal]
          root = "$PWD/smoke-store"
          EOF
          ./smoke/hm --config "$PWD/smoke-config.toml" doctor --quick

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" dist/*.tar.gz dist/*.sha256 --repo "$GITHUB_REPOSITORY" --clobber

  publish-release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
