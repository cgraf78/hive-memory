name: Release

on:
  push:
    tags:
      # GitHub's filter glob is intentionally coarse here; scripts/release-tag.sh
      # performs the exact YYYYMMDD-HHMMSS-<8hex> validation against the commit.
      - "20*"

permissions:
  contents: read

jobs:
  release:
    uses: cgraf78/actions/.github/workflows/rust-release.yml@548850901be83308b74f354d3207db6102f25adf
    permissions:
      contents: write
    with:
      android-aarch64: true
      # Hive Memory's public version is generated from the UTC committer
      # timestamp plus the commit suffix, not from Cargo.toml semver. Ask the
      # shared workflow to validate the exact release tag instead of forcing
      # this repo through Cargo's semver-oriented `version-command` +
      # `tag-prefix` path.
      tag-command: scripts/release-tag.sh
      package-command: scripts/package-release.sh "$RUST_TARGET" "$ASSET_PLATFORM"
      smoke-command: scripts/smoke-release.sh "$ASSET_PLATFORM"
