name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      # Keep CI aligned with the local gate used before commits. Ubuntu runs the
      # full lint/doc gate; macOS runs the test suite so path, filesystem, and
      # symlink behavior do not silently become Linux-only.
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check public docs
        if: matrix.os == 'ubuntu-latest'
        run: RUSTDOCFLAGS='-D missing-docs' cargo doc --no-deps

  performance-budget:
    name: Performance budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # This test is intentionally separate from the default test suite because
      # it creates a 5000-note store and measures real CLI process latency.
      - name: Check warm context/search budgets
        run: cargo test --release --test perf_budget -- --ignored --nocapture

  cloud-sync-sim:
    name: Cloud sync simulation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Simulate the file-level behaviors cloud drives tend to produce around
      # agent writes: independent files merging, conflict copies, and renames.
      - name: Run cloud sync simulation
        run: cargo test --test cloud_sync_sim -- --ignored --nocapture
