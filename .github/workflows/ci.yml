name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    uses: cgraf78/actions/.github/workflows/rust-ci.yml@a3ccc9312378c38a9d33074ea021f96ce93bfb84
    with:
      android-package-smoke-command: |
        scripts/package-release.sh "$RUST_TARGET" "$ASSET_PLATFORM"
        scripts/smoke-release.sh "$ASSET_PLATFORM"
      doc-command: RUSTDOCFLAGS='-D missing-docs' cargo doc --no-deps
      termux-command: scripts/termux-ci.sh
      termux-host-command: |
        target_dir="$RUNNER_TEMP/hive-memory-termux-target"
        cargo build --release --locked --target "$RUST_TARGET" --target-dir "$target_dir"
        mkdir -p .termux-ci
        install -m 0755 \
          "$target_dir/$RUST_TARGET/release/hm" \
          .termux-ci/hm

  shell:
    uses: cgraf78/actions/.github/workflows/shell-ci.yml@a3ccc9312378c38a9d33074ea021f96ce93bfb84
    with:
      profiles: base,shellcheck
      # Shell-owned release behavior lives under tests/shell. Cargo integration
      # tests stay in the conventional tests/*.rs location.
      test-command: |
        tests/shell/release-scripts-test
        tests/shell/automation-test

  source-install:
    name: Locked source install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install from the locked checkout
        run: cargo install --path . --locked --root "$RUNNER_TEMP/hive-memory-install"

      - name: Smoke installed binary
        run: |
          "$RUNNER_TEMP/hive-memory-install/bin/hm" --version

  rustsec:
    name: RustSec advisory audit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # crates.io release versions are immutable. Pinning the tool keeps the
      # gate reproducible while its advisory database still refreshes.
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit the committed dependency graph
        run: cargo audit --file Cargo.lock

  performance-budget:
    name: Performance budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # These tests are intentionally separate from the default suite because
      # they create large synthetic stores/outboxes and measure real CLI
      # process latency.
      - name: Check context/search/flush budgets
        env:
          # GitHub's shared runners have materially higher process-startup and
          # filesystem latency than a warmed local developer machine. Keep the
          # benchmark enforced in CI, but calibrate the threshold to this runner
          # class instead of using the stricter local budget verbatim.
          HIVE_MEMORY_PERF_BUDGET_MULTIPLIER: 4
        run: cargo test --release --test perf_budget -- --ignored --nocapture

  cloud-sync-sim:
    name: Cloud sync simulation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Simulate the file-level behaviors cloud drives tend to produce around
      # agent writes: independent files merging, conflict copies, and renames.
      - name: Run cloud sync simulation
        run: cargo test --test cloud_sync_sim -- --ignored --nocapture
