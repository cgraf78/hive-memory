# Synthetic injection-eval corpus.
#
# A SANITIZED, fictional store that mirrors the SHAPES of a real Hive Memory
# store, so the injection eval (tests/injection_eval.rs) can measure selection
# quality without committing any private data. Every record carries a stable
# `subject` slug; the labels file (inject_labels.toml) uses those slugs as
# ground truth for what a given session should and should not inject.
#
# `kind` and `note` are human annotations for reviewers. The PR1 baseline
# harness keys only on `entry_kind`, `scope`, and `project_id` (the signals the
# current selector actually uses); later phases add a `kind`-aware strategy.
#
# Shapes modeled (and the ground-truth call on each):
#   preference   - durable behavioral guidance, global scope. Inject in EVERY
#                  session: it is how the agent should work.
#   project-fact - a fact about one repo/system, project scope. Inject ONLY in
#                  that project's session.
#   incident     - an operational postmortem/fix, stored today as global+remember.
#                  Ground truth: SEARCH-ONLY, must not auto-inject at startup.
#   reference    - a pointer/lookup fact, global+remember. Ground truth: search-only.
#   raw-note     - low-confidence `hm note` material; must not inject by default.

# ---- preferences: global behavioral guidance, inject everywhere ----

[[record]]
subject = "pref-fd-rg"
kind = "preference"
entry_kind = "remember"
scope = "global"
confidence = "high"
body = "Prefer fd over find and rg over grep when searching the filesystem."
note = "behavioral preference; inject everywhere"

[[record]]
subject = "pref-comments"
kind = "preference"
entry_kind = "remember"
