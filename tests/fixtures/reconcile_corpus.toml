# Labeled corpus for the reconcile (mem0-style ADD/UPDATE/DELETE/NOOP) eval.
#
#  - [[decision]]: does reconcile() pick the right operation for a candidate
#    against existing memories?
#  - [[stream]]: ingesting an ordered fact stream with reconcile-promote should
#    keep the *current* fact retrievable and suppress the *stale* one, where
#    blind append leaves both. Stale markers are chosen so they do NOT appear as
#    a substring of the current fact, so a "leak" means the genuinely stale
#    record was retrieved (not the stale word reused in the current fact).
#
# Synthetic; the only external dependency is the model backend (test is ignored).

# ---- decision accuracy ----------------------------------------------------

[[decision]]
candidate = "The user now prefers neovim as their primary editor."
expected = "update"
[[decision.existing]]
id = "e1"
text = "The user prefers vim as their primary editor."
[[decision.existing]]
id = "e2"
text = "The user lives in Seattle."

[[decision]]
candidate = "The user enjoys trail running on weekends."
