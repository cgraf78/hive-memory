# ---- end-to-end streams ---------------------------------------------------

[[stream]]
facts = [
  "The user prefers vim as their primary editor.",
  "The user now prefers neovim as their primary editor.",
]
[[stream.query]]
ask = "editor preference"
current = "neovim"
stale = "prefers vim"

[[stream]]
facts = [
  "The user's favorite coffee is a cortado.",
  "The user's favorite coffee is now a flat white.",
]
[[stream.query]]
ask = "favorite coffee"
current = "flat white"
stale = "cortado"

[[stream]]
facts = [
  "The user runs continuous integration on Jenkins.",
  "The user has migrated continuous integration entirely to GitHub Actions.",
]
[[stream.query]]
ask = "continuous integration platform"
current = "GitHub Actions"
stale = "Jenkins"

[[stream]]
facts = [
  "The user lives in Portland.",
  "The user has moved and now lives in Austin.",
]
[[stream.query]]
ask = "where the user lives"
current = "Austin"
stale = "Portland"
