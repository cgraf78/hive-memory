# Synthetic write-time classification corpus.
#
# These records are public-safe examples of the write shapes agents should
# classify automatically. `expected_kind` is the ground truth; empty expected
# kind means the deterministic classifier should leave the write untagged.

[[record]]
id = "global-preference"
scope = "global"
body = "The maintainer prefers deterministic agent tooling over runtime-specific magic."
expected_kind = "preference"

[[record]]
id = "imperative-preference"
scope = "global"
body = "Always run the focused test before saying a bug is fixed."
expected_kind = "preference"

[[record]]
id = "dated-preference"
scope = "global"
body = "Since 2026-01-01, always keep generated agent rules in one source."
expected_kind = "preference"
high_value = true

[[record]]
id = "incident"
scope = "global"
body = "2026-06-06 root cause: cron leaked dbus processes until cleanup."
expected_kind = "incident"

[[record]]
id = "reference"
scope = "global"
body = "For host details, read ~/.local/share/doc/dot/home-lab.md before changing machines."
expected_kind = "reference"

[[record]]
id = "project-fact"
scope = "project"
project_id = "repo-alpha"
body = "The test workflow runs on Ubuntu and macOS."
expected_kind = "project-fact"

[[record]]
id = "url-reference"
scope = "global"
body = "Build status dashboard: https://ci.example.com/dashboards/42."
expected_kind = "reference"

[[record]]
id = "doc-citing-project-fact"
scope = "project"
project_id = "repo-alpha"
body = "Architecture decisions live in docs/adr/0001-store-layout.md."
expected_kind = "project-fact"

[[record]]
id = "doc-mention-global"
scope = "global"
body = "The guidelines file is AGENTS.md, kept at the repo root."
expected_kind = ""

[[record]]
id = "ambiguous"
scope = "global"
body = "Something worth revisiting later."
expected_kind = ""

# Scope-inference rows. Evaluated with a project hint present (the launcher
# exports one for every agent write made inside a repo), so these encode which
# bodies may be promoted to project scope. `expected_scope` of "" means the
# configured default must win; `high_value` marks preferences whose demotion
# into one project would be a silent cross-session recall loss.

[[scope_record]]
id = "repo-local-fact"
body = "This repo deploys from tags."
expected_scope = "project"

[[scope_record]]
id = "explicit-project-fact"
explicit_kind = "project-fact"
body = "The test workflow runs on Ubuntu and macOS."
expected_scope = "project"

[[scope_record]]
id = "preference-with-ci-language"
body = "Always run ci checks before deploy."
expected_scope = ""
high_value = true

[[scope_record]]
id = "cross-repo-preference"
body = "Prefer reusable workflow stanzas across repos."
expected_scope = ""
high_value = true

[[scope_record]]
id = "explicit-preference-with-repo-language"
